<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ProjectorOS — Control</title>
    <style>
      :root {
        --bg: #0f1115;
        --panel: #181b22;
        --panel-border: #2a2f3a;
        --fg: #e8ecf1;
        --muted: #8a93a3;
        --accent: #4ade80;
        --warn: #fb923c;
        --error: #ef4444;
        --button: #232831;
        --button-hover: #2d333e;
      }
      html, body {
        margin: 0;
        padding: 0;
        background: var(--bg);
        color: var(--fg);
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
        font-size: 14px;
        min-height: 100vh;
      }
      .wrap { max-width: 720px; margin: 0 auto; padding: 32px 24px; }
      h1 { font-size: 22px; margin: 0 0 4px; }
      .subtitle { color: var(--muted); margin: 0 0 24px; font-size: 13px; }
      .card {
        background: var(--panel);
        border: 1px solid var(--panel-border);
        border-radius: 10px;
        padding: 18px 20px;
        margin-bottom: 14px;
      }
      .card h2 {
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: var(--muted);
        margin: 0 0 12px;
        font-weight: 600;
      }
      .card-header {
        display: flex;
        align-items: center;
        gap: 10px;
        cursor: pointer;
        user-select: none;
        margin: 0 0 12px;
      }
      .card-header h2 { margin: 0; flex: 1; }
      .card-header .card-summary {
        font-size: 12px;
        color: var(--fg);
        font-variant-numeric: tabular-nums;
        opacity: 0.85;
      }
      .card-header .chevron {
        color: var(--muted);
        font-size: 12px;
        line-height: 1;
      }
      .card-header:hover .chevron { color: var(--fg); }
      .row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
      .row + .row { margin-top: 10px; }
      .kv { display: grid; grid-template-columns: 140px 1fr; gap: 6px 14px; font-size: 13px; }
      .kv .k { color: var(--muted); }
      .kv .v { color: var(--fg); font-variant-numeric: tabular-nums; }
      button {
        background: var(--button);
        color: var(--fg);
        border: 1px solid var(--panel-border);
        border-radius: 6px;
        padding: 8px 14px;
        font-size: 13px;
        font-family: inherit;
        cursor: pointer;
        transition: background 0.1s;
      }
      button:hover:not(:disabled) { background: var(--button-hover); }
      button:disabled { opacity: 0.4; cursor: not-allowed; }
      button.primary { background: #1a3a2a; border-color: #2c5240; color: var(--accent); }
      button.primary:hover:not(:disabled) { background: #224a36; }
      button.active { background: #1a3a2a; border-color: var(--accent); color: var(--accent); }
      input[type="number"] {
        background: #0a0c10;
        color: var(--fg);
        border: 1px solid var(--panel-border);
        border-radius: 6px;
        padding: 8px 10px;
        font-size: 14px;
        font-family: inherit;
        width: 110px;
      }
      .pill {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 999px;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .pill.ok { background: rgba(74, 222, 128, 0.12); color: var(--accent); }
      .pill.warn { background: rgba(251, 146, 60, 0.12); color: var(--warn); }
      .pill.error { background: rgba(239, 68, 68, 0.12); color: var(--error); }
      .pill.muted { background: rgba(138, 147, 163, 0.12); color: var(--muted); }
      .help { color: var(--muted); font-size: 12px; line-height: 1.4; margin-top: 8px; }
      .objects {
        font-family: ui-monospace, SFMono-Regular, monospace;
        font-size: 12px;
        color: var(--fg);
        max-height: 220px;
        overflow-y: auto;
      }
      .objects .empty { color: var(--muted); font-style: italic; }
      .objects table { width: 100%; border-collapse: collapse; }
      .objects td { padding: 4px 8px; border-bottom: 1px solid var(--panel-border); }
      .objects td.id { color: var(--accent); width: 60px; }
      .displays { display: flex; flex-direction: column; gap: 6px; margin: 10px 0 12px; }
      .display-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 10px 12px;
        background: #0a0c10;
        border: 1px solid var(--panel-border);
        border-radius: 8px;
      }
      .display-info { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
      .display-name { font-weight: 600; }
      .display-meta { color: var(--muted); font-size: 12px; font-variant-numeric: tabular-nums; }
      .margin-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px 14px;
        margin: 10px 0 12px;
      }
      .margin-field {
        display: flex;
        flex-direction: column;
        gap: 4px;
      }
      .margin-field input {
        background: #0a0c10;
        color: var(--fg);
        border: 1px solid var(--panel-border);
        border-radius: 6px;
        padding: 6px 8px;
        font-size: 13px;
        font-family: inherit;
        font-variant-numeric: tabular-nums;
      }
      .ws-preview {
        display: block;
        margin: 6px 0 12px;
        border-radius: 6px;
      }
      .toggle-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 8px 0;
        font-size: 13px;
        cursor: pointer;
        user-select: none;
      }
      .toggle-row input[type="checkbox"] {
        width: 16px;
        height: 16px;
        accent-color: var(--accent);
      }
      .help.warn-text { color: var(--warn); }
      .calib-preview {
        position: relative;
        margin: 10px 0 12px;
        background: #000;
        border: 1px solid var(--panel-border);
        border-radius: 8px;
        overflow: hidden;
        line-height: 0;
      }
      .calib-preview img {
        display: block;
        width: 100%;
        height: auto;
        max-height: 360px;
        object-fit: contain;
      }
      .calib-overlay {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
      }
      .calib-preview.rot-180 img,
      .calib-preview.rot-180 .calib-overlay {
        transform: rotate(180deg);
        transform-origin: center;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>ProjectorOS</h1>
      <p class="subtitle">Control panel — runs in your laptop browser.</p>
      <div id="root"></div>
    </div>
    <script type="module" src="/src/control.ts"></script>
  </body>
</html>
